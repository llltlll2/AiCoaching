server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Disallow access to SQLite database files directly from the web
    location ~* \.sqlite3$ {
        deny all;
        return 404;
    }

    # Serve static files directly via Nginx for maximum performance
    location /static/ {
        alias /var/www/aicoaching/backend/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Pass all other requests to Gunicorn socket
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/aicoaching.sock;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
